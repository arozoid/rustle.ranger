#-------------------------------------------
# Websites
#-------------------------------------------
ext x?html?, has vivaldi,        X, flag f = vivaldi -- "$@"
ext x?html?, has qutebrowser,    X, flag f = qutebrowser -- "$@"
ext x?html?, has firefox,        X, flag f = firefox -- "$@"
ext x?html?, terminal, has w3m   = w3m "$@"

#-------------------------------------------
# Text / Editor
#-------------------------------------------
mime ^text, label editor = ${VISUAL:-vim} -- "$@"
mime ^text, label pager  = "${PAGER:-less}" -- "$@"

# Special file extensions for scripts / code
ext rs  = rustc "$1"       # rust files compile with rustc
ext toml = vim "$1"        # toml files open in vim
ext sh   = sh "$1"
ext py   = python3 "$1"
ext js   = node "$1"

#-------------------------------------------
# File Manager / Terminal
#-------------------------------------------
mime ^ranger/x-terminal-emulator, has ghostty    = ghostty -e "$@"
mime ^ranger/x-terminal-emulator, has alacritty  = alacritty -e "$@"
mime ^ranger/x-terminal-emulator, has kitty      = kitty -- "$@"
mime ^ranger/x-terminal-emulator, has st         = st -e "$@"
mime ^ranger/x-terminal-emulator, has ranger     = ranger "$@"

#-------------------------------------------
# Documents
#-------------------------------------------
ext pdf, has zathura, X, flag f = zathura -- "$@"
ext pdf, has mupdf, X, flag f   = mupdf "$@"
ext docx?|odf|pptx?, has libreoffice, X, flag f = libreoffice "$@"

#-------------------------------------------
# Media
#-------------------------------------------
# GUI audio players
mime ^audio, X, has rhythmbox, flag f = rhythmbox -- "$@"
mime ^audio, X, has vlc,       flag f = vlc -- "$@"

# Terminal audio players
mime ^audio, terminal, has mpv      = mpv -- "$@"
mime ^audio, terminal, has mplayer  = mplayer -- "$@"
mime ^audio, terminal, has mplayer2 = mplayer2 -- "$@"
mime ^audio, terminal, has cmus     = cmus -- "$@"

# Video
mime ^video, X, has mpv, flag f = mpv --fs -- "$@"
mime ^video, terminal, !X, has mpv = mpv -- "$@"

# Images
mime ^image, X, has feh, flag f = feh -- "$@"
mime ^image, X, has sxiv, flag f = sxiv -- "$@"

#-------------------------------------------
# Rust files / Cargo support
#-------------------------------------------
ext rs, has rust-analyzer = rust-analyzer "$1"
ext toml, has cargo        = cargo check

#-------------------------------------------
# Archives
#-------------------------------------------
ext zip|tar|gz|bz2|xz, has atool = atool --list --each -- "$@"
ext zip|tar|gz|bz2|xz, has atool = atool --extract --each -- "$@"

#-------------------------------------------
# Trash
#-------------------------------------------
label trash, has trash-put = trash-put -- "$@"
label trash = mkdir -p -- ${XDG_DATA_DIR:-$HOME/.ranger}/ranger-trash; mv -- "$@" ${XDG_DATA_DIR:-$HOME/.ranger}/ranger-trash
